<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>化学社团实验申请系统 - 免费云存储版</title>
    <style>
        /* 样式代码与之前相同，为节省篇幅省略，实际使用时复制之前的样式 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #e9f0f5; padding: 20px; }
        .app-container { max-width: 1300px; width: 100%; background: white; border-radius: 28px; margin: 0 auto; overflow: hidden; }
        .header { background: #2c3e66; color: white; padding: 18px 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .logo h2 { font-weight: 500; font-size: 1.5rem; }
        .auth-buttons { display: flex; gap: 12px; }
        button { background: #ffffff20; border: 1px solid #ffffff60; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        button.primary { background: #ffb347; border-color: #ffb347; color: #2c3e66; }
        .panel { padding: 28px 24px; background: #fff; }
        .hidden { display: none; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e2f41; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 1rem; }
        .dynamic-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .dynamic-row input { flex: 2; }
        .dynamic-row input.qty { flex: 0.8; min-width: 80px; }
        .add-btn { background: #e9f0f5; border: 1px dashed #5b7a9a; margin-top: 8px; display: inline-block; }
        .suggest-box { position: relative; flex: 2; }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; }
        .suggest-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .suggest-item:hover { background: #eef2ff; }
        .data-table { width: 100%; border-collapse: collapse; display: block; overflow-x: auto; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.85rem; }
        .data-table th { background: #f1f5f9; }
        .table-wrapper { overflow-x: auto; margin: 20px 0; }
        .admin-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .card { background: #f8fafc; border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 5px; }
        .success-msg { color: #10b981; }
        @media (max-width: 640px) { .panel { padding: 20px 16px; } .dynamic-row { flex-direction: column; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo"><h2>🧪 化学社团实验申请系统 ☁️ 免费云同步</h2></div>
        <div class="auth-buttons">
            <button id="showTeacherLoginBtn" class="primary">👩‍🏫 教师登录</button>
            <button id="showAdminLoginBtn">🔐 管理员登录</button>
            <button id="logoutBtn" class="hidden">🚪 退出</button>
        </div>
    </div>

    <div id="teacherLoginPanel" class="panel">
        <h3>教师登录</h3>
        <div class="form-group"><label>账号</label><input type="text" id="teacherUsername"></div>
        <div class="form-group"><label>密码</label><input type="password" id="teacherPassword"></div>
        <button id="doTeacherLogin" class="primary">登录</button>
        <div id="teacherLoginError" class="error-msg"></div>
    </div>

    <div id="adminLoginPanel" class="panel hidden">
        <h3>管理员登录</h3>
        <div class="form-group"><label>账号</label><input type="text" id="adminUsername"></div>
        <div class="form-group"><label>密码</label><input type="password" id="adminPassword"></div>
        <button id="doAdminLogin" class="primary">登录</button>
        <div id="adminLoginError" class="error-msg"></div>
    </div>

    <div id="teacherPanel" class="panel hidden">
        <h3>📋 实验申请表单</h3>
        <form id="applyForm">
            <div class="form-group"><label>实验名称 *</label><input type="text" id="expName" required></div>
            <div class="form-group"><label>申请时间 *</label>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <input type="number" id="weekNum" placeholder="第几周" style="width:100px;" required>
                    <select id="weekDay"><option>星期一</option><option>星期二</option><option>星期三</option><option>星期四</option><option>星期五</option><option>星期六</option></select>
                    <input type="text" id="timeRange" placeholder="时间范围" required>
                </div>
            </div>
            <div class="form-group"><label>器材</label><div id="equipmentList"></div><button type="button" id="addEquipmentBtn" class="add-btn">+ 添加器材</button></div>
            <div class="form-group"><label>药品</label><div id="chemicalList"></div><button type="button" id="addChemicalBtn" class="add-btn">+ 添加药品</button></div>
            <div class="form-group"><label>社团老师</label><input type="text" id="teacherName" required></div>
            <div class="form-group"><label>学生人数</label><input type="number" id="studentCount" min="1" required></div>
            <div class="form-group"><label>备注</label><textarea id="remarks" rows="2"></textarea></div>
            <button type="submit" class="primary">提交申请</button>
        </form>
        <div id="applyMsg"></div>
    </div>

    <div id="adminPanel" class="panel hidden">
        <h3>⚙️ 管理员后台</h3>
        <div class="card"><h4>修改管理员密码</h4><input type="password" id="newAdminPwd" placeholder="新密码"><button id="updateAdminPwdBtn">更新</button><div id="pwdMsg"></div></div>
        <div class="card"><h4>教师账号管理</h4><input type="text" id="newTeacherUser" placeholder="新教师账号"><input type="text" id="newTeacherPwd" placeholder="密码"><button id="addTeacherBtn">添加</button><div id="teacherListArea"></div></div>
        <div class="card"><h4>实验申请记录</h4><button id="exportDocBtn">导出 DOC</button><button id="refreshRecordsBtn">刷新</button><div class="table-wrapper" id="recordsTableContainer">加载中...</div></div>
    </div>
</div>

<script>
    // ==================== 免费云存储配置 ====================
    // 使用 JSONBin.io 免费存储（无需注册，数据公开）
    // ⚠️ 重要：请先访问 https://jsonbin.io 获取一个免费的 Bin ID
    // 或者使用下面的默认测试 Bin（建议自己创建）
    
    // 方式1：使用 JSONBin.io（推荐，稳定免费）
    // 步骤：1. 访问 https://jsonbin.io 2. 点击 "Create Bin" 3. 输入初始数据 4. 复制 Bin ID
    const USE_JSONBIN = true;
    const JSONBIN_BIN_ID = "你的BinID";  // 替换为你的 Bin ID
    const JSONBIN_API_KEY = "";  // 可选，不填也可以使用公开 bin
    
    // 方式2：使用 localStorage 本地存储（完全免费，但无法多设备同步）
    // 如果不想用云存储，设置 USE_LOCAL_ONLY = true
    const USE_LOCAL_ONLY = false;  // 改为 true 则只用本地存储
    
    // 数据存储 Key
    const STORAGE_KEYS = {
        TEACHERS: 'chem_teachers',
        APPLICATIONS: 'chem_applications',
        EQUIPMENTS: 'chem_equipments',
        CHEMICALS: 'chem_chemicals',
        ADMIN: 'chem_admin'
    };
    
    // 默认数据
    const DEFAULT_DATA = {
        teachers: [{ username: "teacher1", password: "123" }],
        applications: [],
        equipments: ["试管", "烧杯", "酒精灯", "量筒", "滴定管", "铁架台", "漏斗", "玻璃棒", "容量瓶", "胶头滴管"],
        chemicals: ["盐酸", "氢氧化钠", "酚酞", "硫酸铜", "氯化钠", "乙醇", "高锰酸钾", "过氧化氢", "硫酸", "氨水"],
        admin: { username: "admin", password: "admin" }
    };
    
    // 全局数据缓存
    let cloudData = { ...DEFAULT_DATA };
    
    // ========== 数据存储操作 ==========
    async function saveToCloud() {
        if (USE_LOCAL_ONLY) {
            for (let key in cloudData) {
                localStorage.setItem(STORAGE_KEYS[key.toUpperCase()], JSON.stringify(cloudData[key]));
            }
            return;
        }
        
        if (USE_JSONBIN && JSONBIN_BIN_ID && JSONBIN_BIN_ID !== "你的BinID") {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(JSONBIN_API_KEY && { 'X-Master-Key': JSONBIN_API_KEY })
                    },
                    body: JSON.stringify(cloudData)
                });
                if (!response.ok) throw new Error('保存失败');
                console.log('云同步成功');
            } catch (error) {
                console.warn('云同步失败，使用本地存储:', error);
                // 降级到本地存储
                for (let key in cloudData) {
                    localStorage.setItem(STORAGE_KEYS[key.toUpperCase()], JSON.stringify(cloudData[key]));
                }
            }
        } else {
            // 未配置 JSONBin，使用本地存储
            for (let key in cloudData) {
                localStorage.setItem(STORAGE_KEYS[key.toUpperCase()], JSON.stringify(cloudData[key]));
            }
        }
    }
    
    async function loadFromCloud() {
        // 先尝试从本地加载
        let hasLocalData = false;
        for (let key of ['TEACHERS', 'APPLICATIONS', 'EQUIPMENTS', 'CHEMICALS', 'ADMIN']) {
            const local = localStorage.getItem(STORAGE_KEYS[key]);
            if (local) {
                cloudData[key.toLowerCase()] = JSON.parse(local);
                hasLocalData = true;
            }
        }
        
        if (USE_LOCAL_ONLY) return;
        
        if (USE_JSONBIN && JSONBIN_BIN_ID && JSONBIN_BIN_ID !== "你的BinID") {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    headers: JSONBIN_API_KEY ? { 'X-Master-Key': JSONBIN_API_KEY } : {}
                });
                if (response.ok) {
                    const result = await response.json();
                    if (result.record) {
                        cloudData = { ...DEFAULT_DATA, ...result.record };
                        // 同步到本地
                        for (let key in cloudData) {
                            localStorage.setItem(STORAGE_KEYS[key.toUpperCase()], JSON.stringify(cloudData[key]));
                        }
                        console.log('从云端加载成功');
                        return;
                    }
                }
            } catch (error) {
                console.warn('云端加载失败，使用本地数据:', error);
            }
        }
        
        // 如果没有云端数据且没有本地数据，初始化默认数据
        if (!hasLocalData) {
            cloudData = { ...DEFAULT_DATA };
            await saveToCloud();
        }
    }
    
    // API 获取数据
    function getTeachers() { return cloudData.teachers || []; }
    function getApplications() { return cloudData.applications || []; }
    function getEquipments() { return cloudData.equipments || []; }
    function getChemicals() { return cloudData.chemicals || []; }
    function getAdmin() { return cloudData.admin || { username: 'admin', password: 'admin' }; }
    
    async function setTeachers(data) { cloudData.teachers = data; await saveToCloud(); }
    async function setApplications(data) { cloudData.applications = data; await saveToCloud(); }
    async function addApplication(app) { cloudData.applications.unshift(app); await saveToCloud(); }
    async function updateAdmin(admin) { cloudData.admin = admin; await saveToCloud(); }
    
    // 当前登录状态
    let currentUserType = null;
    let currentTeacherName = null;
    
    // DOM 元素
    const teacherLoginPanel = document.getElementById('teacherLoginPanel');
    const adminLoginPanel = document.getElementById('adminLoginPanel');
    const teacherPanel = document.getElementById('teacherPanel');
    const adminPanel = document.getElementById('adminPanel');
    const logoutBtn = document.getElementById('logoutBtn');
    
    function showLoginOnly() {
        teacherLoginPanel.classList.remove('hidden');
        adminLoginPanel.classList.add('hidden');
        teacherPanel.classList.add('hidden');
        adminPanel.classList.add('hidden');
        logoutBtn.classList.add('hidden');
        currentUserType = null;
    }
    
    function switchToTeacherPanel(username) {
        teacherLoginPanel.classList.add('hidden');
        adminLoginPanel.classList.add('hidden');
        teacherPanel.classList.remove('hidden');
        adminPanel.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        currentUserType = 'teacher';
        currentTeacherName = username;
        document.getElementById('applyForm').reset();
        initDynamicRows();
    }
    
    function switchToAdminPanel() {
        teacherLoginPanel.classList.add('hidden');
        adminLoginPanel.classList.add('hidden');
        teacherPanel.classList.add('hidden');
        adminPanel.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
        currentUserType = 'admin';
        renderTeacherList();
        renderAllApplications();
    }
    
    // 教师登录
    document.getElementById('doTeacherLogin').addEventListener('click', async () => {
        const username = document.getElementById('teacherUsername').value.trim();
        const pwd = document.getElementById('teacherPassword').value.trim();
        const teachers = getTeachers();
        const found = teachers.find(t => t.username === username && t.password === pwd);
        if (found) {
            switchToTeacherPanel(username);
        } else {
            document.getElementById('teacherLoginError').innerText = '账号或密码错误';
        }
    });
    
    // 管理员登录
    document.getElementById('doAdminLogin').addEventListener('click', async () => {
        const username = document.getElementById('adminUsername').value;
        const pwd = document.getElementById('adminPassword').value;
        const admin = getAdmin();
        if (username === admin.username && pwd === admin.password) {
            switchToAdminPanel();
        } else {
            document.getElementById('adminLoginError').innerText = '管理员账号或密码错误';
        }
    });
    
    // 提交申请
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (currentUserType !== 'teacher') return;
        
        const expName = document.getElementById('expName').value.trim();
        const weekNum = document.getElementById('weekNum').value;
        const weekDay = document.getElementById('weekDay').value;
        const timeRange = document.getElementById('timeRange').value.trim();
        const teacherName = document.getElementById('teacherName').value.trim();
        const studentCount = document.getElementById('studentCount').value;
        const remarks = document.getElementById('remarks').value;
        
        if (!expName || !weekNum || !timeRange || !teacherName || !studentCount) {
            document.getElementById('applyMsg').innerHTML = '<span class="error-msg">请填写完整必填项</span>';
            return;
        }
        
        const equipItems = [];
        document.querySelectorAll('#equipmentList .dynamic-row').forEach(row => {
            const name = row.querySelector('.eq-name')?.value.trim();
            const qty = row.querySelector('.eq-qty')?.value;
            if (name && qty) equipItems.push({ name, quantity: qty });
        });
        
        const chemItems = [];
        document.querySelectorAll('#chemicalList .dynamic-row').forEach(row => {
            const name = row.querySelector('.ch-name')?.value.trim();
            const qty = row.querySelector('.ch-qty')?.value;
            if (name && qty) chemItems.push({ name, quantity: qty });
        });
        
        const newApp = {
            id: Date.now(),
            expName,
            timeDesc: `第${weekNum}周 ${weekDay} ${timeRange}`,
            equipments: equipItems,
            chemicals: chemItems,
            teacher: teacherName,
            studentCount: parseInt(studentCount),
            remarks: remarks || '',
            submitter: currentTeacherName,
            submitTime: new Date().toLocaleString(),
            createdAt: new Date().toISOString()
        };
        
        await addApplication(newApp);
        document.getElementById('applyMsg').innerHTML = '<span class="success-msg">✅ 提交成功！数据已同步</span>';
        document.getElementById('applyForm').reset();
        initDynamicRows();
        setTimeout(() => document.getElementById('applyMsg').innerHTML = '', 3000);
    });
    
    // 渲染申请记录
    async function renderAllApplications() {
        const apps = getApplications();
        if (apps.length === 0) {
            document.getElementById('recordsTableContainer').innerHTML = '<p>暂无实验申请记录</p>';
            return;
        }
        
        let tableHtml = `<table class="data-table"><thead><tr><th>实验名称</th><th>时间</th><th>器材</th><th>药品</th><th>老师</th><th>人数</th><th>备注</th><th>提交教师</th></tr></thead><tbody>`;
        for (let app of apps) {
            const eqStr = (app.equipments || []).map(e => `${e.name} x${e.quantity}`).join(', ') || '无';
            const chemStr = (app.chemicals || []).map(c => `${c.name} x${c.quantity}`).join(', ') || '无';
            tableHtml += `<tr><td>${escapeHtml(app.expName)}</td><td>${escapeHtml(app.timeDesc)}</td><td>${escapeHtml(eqStr)}</td><td>${escapeHtml(chemStr)}</td><td>${escapeHtml(app.teacher)}</td><td>${app.studentCount}</td><td>${escapeHtml(app.remarks)}</td><td>${escapeHtml(app.submitter)}</td></tr>`;
        }
        tableHtml += '</tbody></table>';
        document.getElementById('recordsTableContainer').innerHTML = tableHtml;
    }
    
    // 渲染教师列表
    async function renderTeacherList() {
        const teachers = getTeachers();
        let html = '<ul style="list-style: none; padding-left:0;">';
        for (let teacher of teachers) {
            html += `<li style="background:#f1f5f9; margin:6px 0; padding:8px 12px; border-radius:20px;">📖 ${teacher.username} <button class="delTeacherBtn" data-user="${teacher.username}" style="float:right; background:#dc2626; border:none; color:white; padding:2px 12px; border-radius:20px;">删除</button></li>`;
        }
        html += '</ul>';
        document.getElementById('teacherListArea').innerHTML = html;
        
        document.querySelectorAll('.delTeacherBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const username = btn.getAttribute('data-user');
                let teachersArr = getTeachers();
                teachersArr = teachersArr.filter(t => t.username !== username);
                await setTeachers(teachersArr);
                renderTeacherList();
            });
        });
    }
    
    // 添加教师
    document.getElementById('addTeacherBtn').addEventListener('click', async () => {
        const newUser = document.getElementById('newTeacherUser').value.trim();
        const newPwd = document.getElementById('newTeacherPwd').value.trim();
        if (!newUser || !newPwd) { alert('请填写完整'); return; }
        
        let teachers = getTeachers();
        if (teachers.find(t => t.username === newUser)) { alert('账号已存在'); return; }
        teachers.push({ username: newUser, password: newPwd });
        await setTeachers(teachers);
        document.getElementById('newTeacherUser').value = '';
        document.getElementById('newTeacherPwd').value = '';
        renderTeacherList();
        alert('添加成功');
    });
    
    // 修改管理员密码
    document.getElementById('updateAdminPwdBtn').addEventListener('click', async () => {
        const newPwd = document.getElementById('newAdminPwd').value;
        if (!newPwd) { document.getElementById('pwdMsg').innerHTML = '<span class="error-msg">请输入新密码</span>'; return; }
        await updateAdmin({ username: 'admin', password: newPwd });
        document.getElementById('pwdMsg').innerHTML = '<span class="success-msg">密码更新成功</span>';
        setTimeout(() => document.getElementById('pwdMsg').innerHTML = '', 2000);
    });
    
    // 导出 DOC
    document.getElementById('exportDocBtn')?.addEventListener('click', () => {
        const apps = getApplications();
        if (!apps.length) { alert('暂无数据'); return; }
        
        let docHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>实验申请记录</title></head><body><h2>化学社团实验申请记录</h2><table border="1"><thead><tr><th>实验名称</th><th>时间</th><th>器材</th><th>药品</th><th>老师</th><th>人数</th><th>备注</th></tr></thead><tbody>`;
        for (let app of apps) {
            const eqStr = (app.equipments || []).map(e => `${e.name}×${e.quantity}`).join(',');
            const chemStr = (app.chemicals || []).map(c => `${c.name}×${c.quantity}`).join(',');
            docHtml += `<tr><td>${app.expName}</td><td>${app.timeDesc}</td><td>${eqStr}</td><td>${chemStr}</td><td>${app.teacher}</td><td>${app.studentCount}</td><td>${app.remarks || ''}</td></tr>`;
        }
        docHtml += `</tbody></table></body></html>`;
        const blob = new Blob([docHtml], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `实验申请记录_${new Date().toISOString().slice(0, 19)}.doc`;
        link.click();
        URL.revokeObjectURL(link.href);
    });
    
    document.getElementById('refreshRecordsBtn')?.addEventListener('click', () => renderAllApplications());
    
    // 动态行功能
    let currentEquipments = [];
    let currentChemicals = [];
    
    function loadInventory() {
        currentEquipments = getEquipments();
        currentChemicals = getChemicals();
    }
    
    function initDynamicRows() {
        document.getElementById('equipmentList').innerHTML = '';
        document.getElementById('chemicalList').innerHTML = '';
        addEquipmentRow();
        addChemicalRow();
    }
    
    function addEquipmentRow() {
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `<div class="suggest-box"><input type="text" class="eq-name" placeholder="器材名称"><div class="suggestions" style="display:none;"></div></div><input type="number" class="eq-qty" placeholder="数量" style="flex:0.8" min="1" value="1"><button type="button" class="remove-row-btn">删除</button>`;
        const nameInput = div.querySelector('.eq-name');
        const suggestDiv = div.querySelector('.suggestions');
        nameInput.addEventListener('input', function(e) {
            const keyword = e.target.value;
            if (!keyword.trim()) { suggestDiv.style.display = 'none'; return; }
            const matched = currentEquipments.filter(item => item.includes(keyword));
            suggestDiv.innerHTML = '';
            if (matched.length) {
                suggestDiv.style.display = 'block';
                matched.forEach(m => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'suggest-item';
                    itemDiv.innerText = m;
                    itemDiv.onclick = () => { nameInput.value = m; suggestDiv.style.display = 'none'; };
                    suggestDiv.appendChild(itemDiv);
                });
            } else suggestDiv.style.display = 'none';
        });
        div.querySelector('.remove-row-btn').addEventListener('click', () => div.remove());
        document.getElementById('equipmentList').appendChild(div);
    }
    
    function addChemicalRow() {
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `<div class="suggest-box"><input type="text" class="ch-name" placeholder="药品名称"><div class="suggestions" style="display:none;"></div></div><input type="number" class="ch-qty" placeholder="数量" style="flex:0.8" min="1" value="1"><button type="button" class="remove-row-btn">删除</button>`;
        const nameInput = div.querySelector('.ch-name');
        const suggestDiv = div.querySelector('.suggestions');
        nameInput.addEventListener('input', function(e) {
            const keyword = e.target.value;
            if (!keyword.trim()) { suggestDiv.style.display = 'none'; return; }
            const matched = currentChemicals.filter(item => item.includes(keyword));
            suggestDiv.innerHTML = '';
            if (matched.length) {
                suggestDiv.style.display = 'block';
                matched.forEach(m => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'suggest-item';
                    itemDiv.innerText = m;
                    itemDiv.onclick = () => { nameInput.value = m; suggestDiv.style.display = 'none'; };
                    suggestDiv.appendChild(itemDiv);
                });
            } else suggestDiv.style.display = 'none';
        });
        div.querySelector('.remove-row-btn').addEventListener('click', () => div.remove());
        document.getElementById('chemicalList').appendChild(div);
    }
    
    document.getElementById('addEquipmentBtn').addEventListener('click', () => addEquipmentRow());
    document.getElementById('addChemicalBtn').addEventListener('click', () => addChemicalRow());
    document.getElementById('showTeacherLoginBtn').onclick = () => { showLoginOnly(); teacherLoginPanel.classList.remove('hidden'); adminLoginPanel.classList.add('hidden'); };
    document.getElementById('showAdminLoginBtn').onclick = () => { showLoginOnly(); teacherLoginPanel.classList.add('hidden'); adminLoginPanel.classList.remove('hidden'); };
    logoutBtn.onclick = () => { showLoginOnly(); };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    // 启动
    async function start() {
        await loadFromCloud();
        loadInventory();
        showLoginOnly();
    }
    start();
</script>
</body>
</html>
